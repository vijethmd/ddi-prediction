name: tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
      - name: Assert RDKit is importable
        # CI used to install no RDKit, so the structural feature path was never
        # exercised and a green run said nothing about it.
        run: |
          python -c "from ddi.features.engineer import RDKIT_AVAILABLE; assert RDKIT_AVAILABLE, 'RDKit missing'"
      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=src/ddi --cov-report=term-missing

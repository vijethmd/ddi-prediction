# Render Blueprint. Deploys the FastAPI service from the Dockerfile, which
# installs RDKit's system libs and bakes in the model bundle + drug reference.
# The Streamlit demo UI is deployed separately on Streamlit Cloud (see DEPLOY.md).
services:
  - type: web
    name: ddi-prediction-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DDI_MODEL_PATH
        value: /app/models/ddi_bundle.joblib
      - key: DDI_REFERENCE_PATH
        value: /app/data/processed/drug_reference.json
      # Offline serving by default; set to "1" only to allow PubChem fallback.
      - key: DDI_ALLOW_NETWORK
        value: "0"
      # Lock CORS to your deployed UI origin. Set this to the URL of the
      # front-end that calls this API.
      - key: DDI_CORS_ORIGINS
        value: "http://localhost:8501"
